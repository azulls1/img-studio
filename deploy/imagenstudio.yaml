version: "3.8"

services:
  frontend:
    image: imagenstudio-frontend:latest
    networks:
      - iagenteknet
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        # HTTPS
        - "traefik.http.routers.imagenstudio.entrypoints=websecure"
        - "traefik.http.routers.imagenstudio.rule=Host(`imagenstudio.iagentek.com.mx`)"
        - "traefik.http.routers.imagenstudio.service=imagenstudio"
        - "traefik.http.routers.imagenstudio.tls=true"
        - "traefik.http.routers.imagenstudio.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.imagenstudio.loadbalancer.server.port=80"
        # HTTP -> HTTPS redirect
        - "traefik.http.routers.imagenstudio-http.entrypoints=web"
        - "traefik.http.routers.imagenstudio-http.rule=Host(`imagenstudio.iagentek.com.mx`)"
        - "traefik.http.routers.imagenstudio-http.middlewares=imagenstudio-redirect"
        - "traefik.http.middlewares.imagenstudio-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.imagenstudio-redirect.redirectscheme.permanent=true"

  api:
    image: imagenstudio-api:latest
    networks:
      - iagenteknet
      - internal
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=iagentekminioback.iagentek.com.mx
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=Iagentek_123
      - MINIO_BUCKET=imgstudio
      - MINIO_USE_SSL=true
      - MINIO_PUBLIC_URL=https://iagentekminioback.iagentek.com.mx
      - SUPABASE_URL=https://iagenteksupabase.iagentek.com.mx
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALLOWED_ORIGINS=https://imagenstudio.iagentek.com.mx
      - IMAGE_MODEL=dall-e-3
      - IMAGE_SIZE=1024x1024
      - IMAGE_QUALITY=standard
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.imagenstudio-api.entrypoints=websecure"
        - "traefik.http.routers.imagenstudio-api.rule=Host(`imagenstudio.iagentek.com.mx`) && PathPrefix(`/api`)"
        - "traefik.http.routers.imagenstudio-api.service=imagenstudio-api"
        - "traefik.http.routers.imagenstudio-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.imagenstudio-api.loadbalancer.server.port=8080"

  worker:
    image: imagenstudio-worker:latest
    networks:
      - internal
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=iagentekminioback.iagentek.com.mx
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=Iagentek_123
      - MINIO_BUCKET=imgstudio
      - MINIO_USE_SSL=true
      - MINIO_PUBLIC_URL=https://iagentekminioback.iagentek.com.mx
      - SUPABASE_URL=https://iagenteksupabase.iagentek.com.mx
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - IMAGE_MODEL=dall-e-3
      - IMAGE_SIZE=1024x1024
      - IMAGE_QUALITY=standard
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    networks:
      - internal
    deploy:
      replicas: 1

networks:
  iagenteknet:
    external: true
  internal:
    driver: overlay
